name: Compilar y Publicar X20Guard

on:
  push:
    branches: [ "master", "main" ] # Escucha ambas ramas

jobs:
  build:
    runs-on: windows-latest
    # Necesitamos permisos para crear el lanzamiento y subir archivos
    permissions:
      contents: write

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Compilar y empaquetar en un solo archivo (Single-File)
      # Esto fusiona el .exe, el .dll y los .json en un solo ejecutable funcional
      run: dotnet publish -c Release -r win-x64 -p:PublishSingleFile=true --self-contained false -o ./publish_output

    - name: Crear Tag y Lanzamiento
      uses: softprops/action-gh-release@v2
      with:
        # Usa el número de ejecución para que cada versión sea única
        tag_name: v1.0.${{ github.run_number }}
        name: X20Guard v1.0.${{ github.run_number }}
        body: |
          🚀 Nueva versión compilada automáticamente.
          - Utilidad silenciosa para forzar Overclock de monitor (100Hz).
          - Soluciona el error de "Handshake" de Intel HD Graphics al salir de suspensión.
          - Empaquetado como un solo archivo (.exe) nativo para Windows x64.
        draft: false
        prerelease: false
        # Ahora apuntamos directamente a la carpeta de publicación que creamos arriba
        files: './publish_output/X20Guard.exe'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
